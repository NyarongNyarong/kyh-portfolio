<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio 2025</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f4f6f8;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f4f6f8;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 56px;
        padding: 12px 18px;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid #d7dde5;
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .meta {
        color: #52616f;
        font-size: 14px;
        white-space: nowrap;
      }

      main {
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 18px 12px 40px;
      }

      .page {
        margin: 0 auto 18px;
        background: #ffffff;
        border: 1px solid #d9dee7;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      .page img {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 720px) {
        header {
          padding: 10px 12px;
        }

        h1 {
          font-size: 16px;
        }

        .meta {
          font-size: 13px;
        }

        main {
          padding: 10px 0 24px;
        }

        .page {
          margin-bottom: 10px;
          border-left: 0;
          border-right: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Portfolio 2025</h1>
      <div class="meta">32 pages</div>
    </header>
    <main aria-label="Portfolio pages">
      <figure class="page"><img src="pages/1.jpg" alt="Portfolio page 1" loading="eager"></figure>
      <figure class="page"><img src="pages/2.jpg" alt="Portfolio page 2" loading="lazy"></figure>
      <figure class="page"><img src="pages/3.jpg" alt="Portfolio page 3" loading="lazy"></figure>
      <figure class="page"><img src="pages/4.jpg" alt="Portfolio page 4" loading="lazy"></figure>
      <figure class="page"><img src="pages/5.jpg" alt="Portfolio page 5" loading="lazy"></figure>
      <figure class="page"><img src="pages/6.jpg" alt="Portfolio page 6" loading="lazy"></figure>
      <figure class="page"><img src="pages/7.jpg" alt="Portfolio page 7" loading="lazy"></figure>
      <figure class="page"><img src="pages/8.jpg" alt="Portfolio page 8" loading="lazy"></figure>
      <figure class="page"><img src="pages/9.jpg" alt="Portfolio page 9" loading="lazy"></figure>
      <figure class="page"><img src="pages/10.jpg" alt="Portfolio page 10" loading="lazy"></figure>
      <figure class="page"><img src="pages/11.jpg" alt="Portfolio page 11" loading="lazy"></figure>
      <figure class="page"><img src="pages/12.jpg" alt="Portfolio page 12" loading="lazy"></figure>
      <figure class="page"><img src="pages/13.jpg" alt="Portfolio page 13" loading="lazy"></figure>
      <figure class="page"><img src="pages/14.jpg" alt="Portfolio page 14" loading="lazy"></figure>
      <figure class="page"><img src="pages/15.jpg" alt="Portfolio page 15" loading="lazy"></figure>
      <figure class="page"><img src="pages/16.jpg" alt="Portfolio page 16" loading="lazy"></figure>
      <figure class="page"><img src="pages/17.jpg" alt="Portfolio page 17" loading="lazy"></figure>
      <figure class="page"><img src="pages/18.jpg" alt="Portfolio page 18" loading="lazy"></figure>
      <figure class="page"><img src="pages/19.jpg" alt="Portfolio page 19" loading="lazy"></figure>
      <figure class="page"><img src="pages/20.jpg" alt="Portfolio page 20" loading="lazy"></figure>
      <figure class="page"><img src="pages/21.jpg" alt="Portfolio page 21" loading="lazy"></figure>
      <figure class="page"><img src="pages/22.jpg" alt="Portfolio page 22" loading="lazy"></figure>
      <figure class="page"><img src="pages/23.jpg" alt="Portfolio page 23" loading="lazy"></figure>
      <figure class="page"><img src="pages/24.jpg" alt="Portfolio page 24" loading="lazy"></figure>
      <figure class="page"><img src="pages/25.jpg" alt="Portfolio page 25" loading="lazy"></figure>

    </main>
  </body>
</html>
